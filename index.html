<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Invitación</title>
<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin-top: 100px;
    }

    #siBtn, #noBtn {
        padding: 15px 30px;
        font-size: 18px;
        margin: 10px;
        cursor: pointer;
        border-radius: 10px;
        border: none;
    }

    #siBtn {
        background-color: #4CAF50;
        color: white;
        transition: all 0.2s ease;
    }

    #noBtn {
        background-color: #f44336;
        color: white;
    }
</style>
</head>
<body>

<h2>¿Quieres ver el atardecer el sábado en un sitio top?</h2>

<button id="siBtn">Sí</button>
<button id="noBtn">No</button>

<script>
    let size = 1;

    document.getElementById("noBtn").addEventListener("click", function() {
        size += 0.2; 
        document.getElementById("siBtn").style.transform = `scale(${size})`;
    });

    document.getElementById("siBtn").addEventListener("click", function() {
        alert("Sabía que dirías que sí 😎🌅");
    });
</script>

</body>
</html>
